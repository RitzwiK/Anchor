services:
  - type: web
    name: anchor-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      # Optional: only if you want LLM-generated narratives. Leave unset to use
      # the built-in template writer (works fine, 100% grounded by construction).
      - key: OPENAI_API_KEY
        sync: false
